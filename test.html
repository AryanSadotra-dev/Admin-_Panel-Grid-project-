<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/webp" href="img/icon.webp">
</head>
<body>
<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <h2>AdminLTE 4</h2>
        </div>

        <ul>
            <li>Dashboard</li>
            <li>Dashboard v1</li>
            <li>Dashboard v2</li>
            <li>Dashboard v3</li>
            <li>Widgets</li>
            <li>Forms</li>
            <li>Mailbox</li>
            <li>Settings</li>
        </ul>
    </aside>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="left">
            ☰
            Live Preview
            Documentation
        </div>
        <div class="right">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-bell"></i>
            <i class="fa-regular fa-user"></i>
        </div>
    </nav>

    <!-- Cards -->
    <div class="card blue">
        <h1>150</h1>
        <p>New Orders</p>
    </div>
    <div class="card green">
        <h1>53%</h1>
        <p>Bounce Rate</p>
    </div>
    <div class="card yellow">
        <h1>44</h1>
        <p>User Registrations</p>
    </div>
    <div class="card red">
        <h1>65</h1>
        <p>Unique Visitors</p>
    </div>

    <!-- Graph -->
    <div class="graph">
        <h2>Sales Value</h2>
        <img src="img/sales banner.jpg" alt="">
    </div>

    <!-- Map -->
    <div class="map">
        <h2>Sales Value</h2>
        <img src="img/sales value.jpg" alt="">
    </div>

</div>
</body>
</html>
